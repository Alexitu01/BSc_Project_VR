<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="FrontEnd/css/style.css" />
    <title>Welcome to the Creation page</title>
  </head>

  <body class="background">
    <h1 class="title">
      <a href="/" class="back"><button>Back</button></a>
      Welcome
    </h1>
    <p class="info">
      Here you can create your own 3D models and export them to your VR
      environment.
    </p>

    <div class="MainContainer">
      <div class="InputContainer">
        <textarea type="text" id="input" class="input"></textarea>
        <button class="optimize" id="optimize" onclick="Optimize()">
          Optimize with AI
        </button>
        <div class="spinner" id="optimizeSpinner"></div>
      </div>

      <div class="OutputContainer">
        <textarea type="text" id="output" class="output"></textarea>
        <button class="generate" id="generate" onclick="Generate()">
          Generate Image
        </button>
        <div class="spinner" id="generateSpinner"></div>
      </div>
    </div>
    <div class="ImageContainer">
      <p class="status">Current images generated:</p>
    </div>
  </body>

  <script>
    async function Optimize() {
      let input = document.getElementById("input").value;
      if (input.trim() == "") {
        alert("Please write something in the input field before optimizing");
        return;
      }
      //Define the button and loading icon.
      let button = document.getElementById("optimize");
      let loading = document.getElementById("optimizeSpinner");

      //If button is pressed, swap it with the loading icon.
      button.style.display = "none";
      loading.style.display = "block";

      let text = { prompt: document.getElementById("input").value };
      const response = await fetch("/CreationPage", {
        method: "POST",
        body: JSON.stringify(text),
      })
        .then((response) => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          } else {
            return response.text();
          }
        })
        .then((data) => {
          //Remove citation marks
          var optimizedResponse = data
            .split('"')
            .join("")
            .replace(/\\n/g, "\n");
          document.getElementById("output").value = optimizedResponse;
        })
        .catch((error) => {
          console.error("Error:", error);
        });
      loading.style.display = "none";
      button.style.display = "block";
    }


    async function Generate() {
      console.log("**********Generate called**********")
      let input = document.getElementById("output").value;
      if (input.trim() == "") {
        alert("Please write something in the input field before optimizing");
        return;
      }
      let button = document.getElementById("generate");
      let loading = document.getElementById("generateSpinner");
      let imageContainer = document.getElementsByClassName("ImageContainer")[0]
      button.style.display = "none";
      loading.style.display = "block";

      let text = { image: input };
      const response = await fetch("/CreationPage", {
        method: "POST",
        body: JSON.stringify(text),
      })
        .then((response) => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          } else {
            return response.json();
          }
        })
        .then((imageJson) => {
          console.log("Response received");
          let imagePath = imageJson.path
          if (typeof imagePath === "string") {
            var image = document.createElement("img");
            image.src = imagePath;
            console.log(imagePath)
            imageContainer.appendChild(image);
          } else {
            alert("Something went wrong, please try again later");
          }
        });
      loading.style.display = "none";
      button.style.display = "block";
    }
  </script>
</html>
