<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="FrontEnd/css/style.css" />
    <title>Welcome to the Creation page</title>
  </head>

  <body class="background">
    <h1 class="title">
      <a href="/" class="back"><button>Back</button></a>
      Welcome
    </h1>
    <p class="info">
      Here you can create your own 3D models and export them to your VR
      environment.
    </p>

    <div class="MainContainer">
      <div class="InputContainer">
        <textarea type="text" id="input" class="input"></textarea>
        <button class="optimize" id="optimize" onclick="Optimize()">
          Optimize with AI
        </button>
        <div class="spinner" id="optimizeSpinner"></div>
      </div>

      <div class="OutputContainer">
        <textarea type="text" id="output" class="output"></textarea>
        <button class="generate" id="generate" onclick="Generate()">
          Generate Image
        </button>
        <div class="spinner" id="generateSpinner"></div>
      </div>
    </div>
    <div class="ImageContainer">
      <p class="status">Current images generated:</p>
    </div>
  </body>

  <script>
    //Method for calling the optimization logic in app.py
    async function Optimize() {
      let input = document.getElementById("input").value; //Get prompt for optimization
      if (input.trim() == "") { //Check the textarea is not empty.
        alert("Please write something in the input field before optimizing");
        return;
      }

      loading();

      let text = { prompt: document.getElementById("input").value }; //Put prompt into json format
      const response = await fetch("/CreationPage", {
        method: "POST",
        body: JSON.stringify(text),
      })
        .then((response) => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          } else {
            return response.text();
          }
        })
        .then((data) => {
          //Remove citation marks
          var optimizedResponse = data
            .split('"')
            .join("")
            .replace(/\\n/g, "\n"); //Gets the optimized prompt from app.py
          document.getElementById("output").value = optimizedResponse; //Put optimized prompt into output container.
        })
        .catch((error) => {
          stopLoading();
          console.error("Error:", error);
        });
      stopLoading();
    }

    //Method for calling generation method in app.py.
    async function Generate() {
      console.log("**********Generate called**********");
      let input = document.getElementById("output").value; //Get the prompt
      if (input.trim() == "") { //Make sure it's not 'empty'
        alert("Please write something in the input field before optimizing");
        return;
      }

      loading(); //Removes button and starts the loading icon.

      let imageContainer = document.getElementsByClassName("ImageContainer")[0];
      let text = { imagePrompt: input }; //Define the prompt as a json to send to app.py
      const response = await fetch("/CreationPage", {
        method: "POST",
        body: JSON.stringify(text),
      })
        .then((response) => { //Checks response to see if there was a connection issue
          if (!response.ok) {
            stopLoading();
            alert("HTTP error! status: " + response.status);
            return;
          } else {
            return response.json();
          }
        })
        .then((imageJson) => { //If no connection issue, we take the response json we get from app.py
          if (imageJson.error == 1) { //See if there was an error with the google api call
            stopLoading();
            alert(imageJson.response);
            return;
          } else {
            console.log("Response received");
            let imagePath = imageJson.response; //Get the path to the saved image, that gemini created
              var image = document.createElement("img");
              image.src = imagePath;
              console.log(imagePath);
              imageContainer.appendChild(image); //Add newly made image to the imagecontainer
          }
        });
      stopLoading();
    }

    function loading() { //Starts loading animation
      let button = document.getElementById("generate");
      let loading = document.getElementById("generateSpinner");
      button.style.display = "none";
      loading.style.display = "block";
    }

    function stopLoading() { //Stops loading animation.
      let button = document.getElementById("generate");
      let loading = document.getElementById("generateSpinner");
      loading.style.display = "none";
      button.style.display = "block";
    }
  </script>
</html>
