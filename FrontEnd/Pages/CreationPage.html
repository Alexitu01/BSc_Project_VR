<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="FrontEnd/css/style.css" />
    <title>Welcome to the Creation page</title>
  </head>

  <body>
    <h1 class="title">Welcome</h1>
    <p class="info">
      Here you can create your own 3D models and export them to your VR
      environment.
    </p>

    <div class="MainContainer">
      <div class="InputContainer">
        <textarea type="text" id="input" class="input"></textarea>
        <button class="generate" onclick="getFunction()">
          Optimize with AI
        </button>
      </div>

      <div class="OutputContainer">
        <textarea type="text" id="output" class="output"></textarea>
        <button class="download">Download</button>
      </div>
    </div>
  </body>

  <script>
    getFunction = () => {
      text = document.getElementById("input").value;
      fetch("/CreationPage", {
        method: "POST",
        body: JSON.stringify({ text }),
      });
    };
    
  </script>
</html>
