<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="FrontEnd/css/style.css" />
    <title>Welcome to the Creation page</title>
  </head>

  <body class="background">
    <h1 class="title">
      <a href="/" class="back"><button>Back</button></a>
      Welcome
    </h1>
    <p class="info">
      Here you can create your own 3D models and export them to your VR
      environment.
    </p>

    <div class="MainContainer">
      <div class="InputContainer">
        <textarea type="text" id="input" class="input"></textarea>
        <button class="optimize" id="optimize" onclick="Optimize()">
          Optimize with AI
        </button>
        <div class="spinner" id="optimizeSpinner"></div>
      </div>

      <div class="OutputContainer">
        <textarea type="text" id="output" class="output"></textarea>
        <button class="generate" id="generate" onclick="Generate()">
          Generate Image
        </button>
        <div class="spinner" id="generateSpinner"></div>
      </div>
    </div>
    <div class="ImageContainer">
      <!-- Contains all relevant to the images and sending those images to create 3d worlds-->
      <p class="status">Current images generated:</p>
      <!-- The images generated -->
      <div class="images">
      </div>
      <!-- The button to  -->
      <div class="wrapper"><button class="inactive" id="generatePly"> Generate 3D </button></div>
    </div>
  </body>
  <script src="FrontEnd/js/creationPage.js"></script>
</html>
