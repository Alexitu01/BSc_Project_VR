<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="FrontEnd/css/style.css" />
    <title>Welcome to the Creation page</title>
  </head>

  <body class="background">
    <h1 class="title">Welcome</h1>
    <p class="info">
      Here you can create your own 3D models and export them to your VR
      environment.
    </p>

    <div class="MainContainer">
      <div class="InputContainer">
        <textarea type="text" id="input" class="input"></textarea>
        <button class="optimize" onclick="Optimize()">Optimize with AI</button>
      </div>

      <div class="OutputContainer">
        <textarea type="text" id="output" class="output"></textarea>
        <button class="generate" onclick="Generate()">Generate Image</button>
      </div>
    </div>
  </body>

  <script>
    async function Optimize() {
      input = document.getElementById("input").value;
      if (String(input) == "") {
        alert("Please write");
      } else {
        text = { prompt: document.getElementById("input").value };
        const response = await fetch("/CreationPage", {
          method: "POST",
          body: JSON.stringify(text),
        })
          .then((response) => {
            if (!response.ok) {
              throw new Error(`HTTP error! status: ${response.status}`);
            } else {
              return response.text();
            }
          })
          .then((data) => {
            //Remove citation marks
            var optimizedResponse = data
              .split('"')
              .join("")
              .replace(/\\n/g, "\n");
            document.getElementById("output").value = optimizedResponse;
          })
          .catch((error) => {
            console.error("Error:", error);
          });
      }
    }

    async function Generate() {
      text = { image: document.getElementById("output").value };
      const response = await fetch("/CreationPage", {
        method: "POST",
        body: JSON.stringify(text),
      })
        .then((response) => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          } else {
            return response.text();
          }
        })
        .then((image) => {
          var imageContainer = document.createElement("img");
          imageContainer.src = image;
          document.body.appendChild(imageContainer);
        });
    }
  </script>
</html>
